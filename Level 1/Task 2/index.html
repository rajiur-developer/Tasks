<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Counter Task | DOM Manipulation</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="./style.css">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
</head>
<body>

    <div class="counter-container">
        <span class="badge">Task 3: DOM Manipulation</span>
        <h1>Counter Application</h1>
        
        <div class="counter-display" id="count">0</div>
        
        <div class="counter-controls">
            <button class="counter-btn" id="decrement" title="Decrease">
                <i data-lucide="minus"></i>
            </button>
            <button class="counter-btn" id="increment" title="Increase">
                <i data-lucide="plus"></i>
            </button>
        </div>
        
        <button class="reset-btn" id="reset">Reset to Zero</button>
    </div>

    <script src="./script.js">
       
    </script>
</body>
</html>
